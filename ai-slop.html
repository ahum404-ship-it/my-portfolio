<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration Guess Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;

            /* --- INSERT YOUR PHOTO ADDRESS BELOW --- */
            background-image: url("https://media.tenor.com/fEthhnb02dIAAAAM/bucktooth-emoji-patrick-star.gif");
            /* ---------------------------------------- */

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* Back button fixed to top-left corner */
        .back-btn {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            backdrop-filter: blur(6px);
            transition: background 0.2s, border-color 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 320px; 
            z-index: 10; 
            transition: transform 0.2s;
        }

        input[type="number"] { 
            width: 80%; 
            padding: 12px; 
            margin: 15px 0; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 1.1rem; 
        }

        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 600;
        }

        #message { 
            margin-top: 20px; 
            font-weight: bold; 
            color: #333; 
            font-size: 1.1rem; 
        }

        .victory-card {
            transform: scale(1.05);
            border: 3px solid #28a745;
        }
    </style>
</head>
<body>

    <!-- Back to main site button -->
    <a class="back-btn" href="index.html">← Back to Main Site</a>

    <div class="card" id="gameCard">
        <h2>Guess the Number</h2>
        <p>Pick a number between 1 and 100</p>
        <input type="number" id="userGuess" placeholder="Enter your guess...">
        <br>
        <button id="submitBtn" onclick="checkGuess()">Check Guess</button>
        <div id="message"></div>
    </div>

    <script>
        const targetNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        let gameActive = true;

        function checkGuess() {
            if (!gameActive) return;
            const guessInput = document.getElementById('userGuess');
            const message = document.getElementById('message');
            const gameCard = document.getElementById('gameCard');
            const guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                message.style.color = "#dc3545";
                message.innerHTML = "⚠️ Enter a number 1-100";
                return;
            }

            attempts++;

            if (guess === targetNumber) {
                gameActive = false;
                message.style.color = "#28a745";
                message.innerHTML = `🎉 BOOM! Correct! <br> Attempts: ${attempts}`;
                gameCard.classList.add('victory-card');
                
                confetti({
                  particleCount: 150,
                  spread: 180,
                  origin: { y: 0.6 },
                  colors: ['#28a745', '#007bff', '#ffc107', '#dc3545']
                });
                
            } else if (guess > targetNumber) {
                message.innerHTML = "⬇️ Too high!";
                guessInput.value = "";
                guessInput.focus();
            } else {
                message.innerHTML = "⬆️ Too low!";
                guessInput.value = "";
                guessInput.focus();
            }
        }
    </script>
</body>
</html>
